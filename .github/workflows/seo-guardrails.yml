name: SEO Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  seo-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run SEO metadata guardrails
        run: npm run test:seo
